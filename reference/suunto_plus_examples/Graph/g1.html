<uiView
  onActivate="
    setInterval(function() { next('#vs-g'); }, 5000);
  ">
  <!-- Graph from value computed in main.js -->
  <div id="suuntoplus">
    <uiViewSet id="vs-g" transition.type="crossfade" rollOver="both" transition.duration="0">
      <div class="selected">
        <graph style="position:absolute;
                  left:0px; top:0px; width:100%; height:100%;
                  box-sizing: border-box;
                  padding-right:90px; padding-top:50px; padding-bottom:50px;
                  font-size:21px;
                  fill-color:rgba(255, 50, 255, 0.7);"
          valueFormat="HeartRate_Fourdigits"
          type="bar"
          grid="three lines"
          inputType="get compilation"
          input="Activity/Log/-1/Move/0/HeartRate/Avg/Data"
          min="0.6666666667"
          max="3"
          slack="0.1" />
      </div>

      <div>
        <graph style="position:absolute;
                  left:0px; top:0px; width:100%; height:100%;
                  box-sizing: border-box;
                  padding-right:90px; padding-top:50px; padding-bottom:50px;
                  font-size:21px;
                  /* style of the line */
                  stroke-color:#F33; stroke-width:4px;
                  /* style of the filling */
                  fill-color:rgba(255, 50, 50, 0.5);"
          valueFormat="auto"
          type="line"
          grid="three lines"
          inputType="subscribe"
          input="Zapp/{zapp_index}/Output/sin"
          min="-1"
          max="1"
          slack="0.1" />
      </div>
    </uiViewSet>
  </div>
</uiView>
