<!-- SuuntoPlus: Template with 2 fields -->
<uiView>
  <div id="suuntoplus">

    <!-- Title and its background -->
    <div class="cm-fg" style="width:100%;height:25%">
      <div class="sp-t-m p-hc" style="top:calc(60% - 50%e)">
        TWO FIELDS
      </div>
    </div>

    <!-- center -->
    <div class="sp-d-xl f-num p-m">
      <eval input="{zapp_center_input}" outputFormat="{zapp_center_format}" default="--" />
    </div>

    <!-- bottom -->
    <div class="sp-d-m f-num p-hc" style="top:calc(82% - 50%e)">
      <eval input="{zapp_bottom_input}" outputFormat="{zapp_bottom_format}" default="--" />
    </div>

  </div>
</uiView>
