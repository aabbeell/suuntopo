<!-- SuuntoPlus: Template with 4 fields, value icons and zone gauge -->

<!-- Field switch interval is set to 5sec -->
<uiView
  onActivate="
    setInterval(function() { next('#z-tl-val'); }, 5000);
  ">

  <div id="suuntoplus">

    <!-- Title and its background -->
    <div class="cm-fg" style="width:100%;height:25%">
      <div class="sp-t-m p-hc" style="top:calc(60% - 50%e)">
        GAUGE
      </div>
    </div>

    <!-- top left -->
    <uiViewSet id="z-tl-val" transition.type="crossfade" rollOver="both" transition.duration="0">
      <div>
        <div class="f-ico" style="top:calc(35% - 100%e);left:calc(26% - 50%e);color:#F50">&#xF178;</div>
        <div class="sp-d-m f-num" style="top:calc(43% - 50%e);left:calc(26% - 50%e);color:#F50">
          <eval input="{zapp_tl1_input}" outputFormat="{zapp_tl1_format}" default="--" />
        </div>
      </div>
      <div>
        <div class="f-ico" style="top:calc(35% - 100%e);left:calc(26% - 50%e)">&#xF178;</div>
        <div class="sp-d-m f-num" style="top:calc(43% - 50%e);left:calc(26% - 50%e)">
          <eval input="{zapp_tl2_input}" outputFormat="{zapp_tl2_format}" default="--" />
        </div>
      </div>
    </uiViewSet>

    <!-- top right -->
    <div class="f-ico" style="top:calc(35% - 100%e);left:calc(74% - 50%e)">&#xF103;</div>
    <div class="sp-d-m f-num" style="top:calc(43% - 50%e);left:calc(74% - 50%e)">
      <eval input="{zapp_tr_input}" outputFormat="{zapp_tr_format}" default="--" />
    </div>

    <!-- middle -->
    <div class="p-hc sp-vertical-center" style="top:calc(62% - 50%e)">
      <span class="f-ico" style="padding-right:4px">&#xF101;</span>
      <span class="sp-d-l f-num">
        <eval input="{zapp_mid_input}" outputFormat="{zapp_mid_format}" default="--" />
      </span>
    </div>

    <!-- bottom middle -->
    <div class="p-hc sp-vertical-center" style="top:calc(87% - 50%e)">
      <span class="f-ico" style="padding-right:4px">&#xF102;</span>
      <span class="sp-d-m f-num">
        <eval input="{zapp_bottom_input}" outputFormat="{zapp_bottom_format}" default="--" />
      </span>
    </div>

    <!-- Zone gauge -->
    <import src="#zone-g" />

  </div>

</uiView>
