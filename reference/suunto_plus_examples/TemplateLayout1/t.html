<!-- SuuntoPlus: Template with one field with unit -->
<uiView>
  <div id="suuntoplus">
    <!-- Title and its background -->
    <div class="cm-fg" style="width:100%;height:25%">
      <div class="sp-t-m p-hc" style="top:calc(60% - 50%e)">
        ONE FIELD
      </div>
    </div>

    <!-- Data field -->
    <div class="p-m sp-vertical-center">
      <span class="sp-d-l f-num">
        <eval input="{zapp_center_input}" outputFormat="{zapp_center_format}" default="--" />
      </span>
      <span class="sp-b-s" style="padding-left:5px;max-width:60px">
        {zapp_center_unit}
      </span>
    </div>
  </div>
</uiView>
